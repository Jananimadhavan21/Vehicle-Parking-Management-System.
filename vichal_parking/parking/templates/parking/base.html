<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vichal Parking Management System{% endblock %}</title>
    <style>
        :root {
            --primary: #1e3a5f;
            --accent: #f2a900;
            --bg: #f4f6f8;
            --card-bg: #ffffff;
            --success: #2e7d32;
            --error: #c62828;
            --text: #1f2933;
            --muted: #6b7280;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        header {
            background: var(--primary);
            color: #fff;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        header h1 {
            margin: 0;
            font-size: 1.4rem;
        }
        header h1 span { color: var(--accent); }
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.95rem;
            opacity: 0.9;
        }
        nav a:hover { opacity: 1; text-decoration: underline; }
        main {
            max-width: 960px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-box {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-box .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-box .label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 4px;
        }
        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 14px;
        }
        .slot {
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            font-weight: 600;
            color: #fff;
        }
        .slot.free { background: var(--success); }
        .slot.occupied { background: var(--error); }
        .slot small {
            display: block;
            font-weight: 400;
            margin-top: 6px;
            font-size: 0.78rem;
            opacity: 0.9;
        }
        form .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input[type=text], select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
        }
        button, .btn {
            background: var(--accent);
            color: #1f2933;
            border: none;
            padding: 11px 22px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-block;
        }
        button:hover, .btn:hover { opacity: 0.9; }
        .btn.secondary {
            background: var(--primary);
            color: #fff;
        }
        .messages { margin-bottom: 20px; }
        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.92rem;
        }
        .message.success { background: #e6f4ea; color: var(--success); border: 1px solid #bfe3c8; }
        .message.error { background: #fdecea; color: var(--error); border: 1px solid #f5c2bf; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.9rem;
        }
        th { color: var(--muted); font-weight: 600; }
        .actions { margin-top: 8px; }
        .actions a { margin-right: 14px; }
        footer {
            text-align: center;
            color: var(--muted);
            font-size: 0.82rem;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Vichal <span>Parking</span> Management System</h1>
        <nav>
            <a href="{% url 'home' %}">Dashboard</a>
            <a href="{% url 'vehicle_entry' %}">Vehicle Entry</a>
            <a href="{% url 'vehicle_exit' %}">Vehicle Exit</a>
            <a href="{% url 'reports' %}">Reports</a>
        </nav>
    </header>

    <main>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        Vichal Parking Management System &mdash; built with Python &amp; Django (in-memory data store)
    </footer>
</body>
</html>
